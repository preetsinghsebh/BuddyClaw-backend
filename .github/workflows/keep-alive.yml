name: Keep Alive Ping

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes 24/7
  workflow_dispatch: # Allows manual testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Bot Endpoint
        run: |
          curl --retry 3 --retry-delay 5 --fail -s https://buddy-claw-universal-60du.onrender.com/health
