services:
  # 1. Buddy Claw universal bot
  - type: web
    name: buddy-claw
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - fromGroup: dostai-shared
      - key: BUDDY_CLAW_TOKEN
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: SARVAM_PROXY_URL
        value: http://localhost:10000/v1/chat/completions
    healthCheckPath: /health

  # 2. Web Frontend (Next.js)
  - type: web
    name: dostai-web
    env: node
    plan: free
    buildCommand: npm install --prefix web && npm run build --prefix web
    startCommand: npm start --prefix web
    envVars:
      - fromGroup: dostai-shared
      - key: SARVAM_PROXY_URL
        fromService:
          name: buddy-claw
          type: web
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
